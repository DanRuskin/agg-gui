name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out agg-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-rust
          path: ../agg-rust

      - name: Check out clipper2-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/clipper2-rust
          path: ../clipper2-rust

      - name: Check out tess2-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/tess2-rust
          path: ../tess2-rust

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build library
        run: cargo build -p agg-gui

      - name: Run tests
        run: cargo test -p agg-gui

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out agg-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-rust
          path: ../agg-rust

      - name: Check out clipper2-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/clipper2-rust
          path: ../clipper2-rust

      - name: Check out tess2-rust (path dependency)
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/tess2-rust
          path: ../tess2-rust

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build demo-wasm --target web --out-dir ../demo/public/pkg --no-typescript
