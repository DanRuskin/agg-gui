name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout SVG test fixtures
        run: git submodule update --init tests/resvg-test-suite

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install demo dependencies
        run: cd demo && bun install

      - name: Build WASM
        run: wasm-pack build demo-wasm --target web --out-dir ../demo/public/pkg --no-typescript

      - name: Bundle TypeScript
        run: cd demo && bun run build

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: demo/dist
          retention-days: 1

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  # Browser smoke test — boots the built WASM demo in headless Chrome and
  # asserts a real, non-blank canvas paints.  Deploy is gated on this so a
  # broken WASM build (panic on init, blank canvas, font-load failure,
  # shader regression) cannot ship to GitHub Pages.
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install demo dependencies
        run: cd demo && bun install

      # `playwright.config.ts` uses `channel: "chrome"`.  ubuntu-latest ships
      # Google Chrome pre-installed, so we only need Playwright's CLI
      # dependencies (no separate browser download).
      - name: Install Playwright dependencies
        run: cd demo && bunx playwright install-deps chrome

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: demo-dist
          # The dev server (bun run dev) reads from demo/public, so place
          # the pre-built WASM + bundle.js there for the test webServer.
          path: demo/dist

      - name: Stage built site for dev server
        run: |
          mkdir -p demo/public/pkg demo/public/dist
          cp -r demo/dist/public/pkg/. demo/public/pkg/
          cp -r demo/dist/public/dist/. demo/public/dist/

      - name: Run screenshot test
        run: cd demo && bunx playwright test screenshot

      - name: Upload screenshot artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-screenshot
          path: demo/tests/snapshots/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
